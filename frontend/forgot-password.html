<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | Ekleans</title>
    <link rel="stylesheet" href="css/admin-auth.css" />
  </head>
  <body class="admin-auth-page">
    <div class="auth-wrapper">
      <div class="auth-header">
        <div class="auth-icon">🔄</div>
        <h2>Reset Password</h2>
        <p>Enter your email to receive reset instructions</p>
      </div>

      <div class="auth-card">
        <form id="resetPasswordForm">
          <div class="form-group">
            <div class="form-header">
              <label for="resetEmail">Email Address</label>
            </div>
            <div class="input-wrapper">
              <span class="input-icon">✉️</span>
              <input
                type="email"
                id="resetEmail"
                class="form-control"
                placeholder="admin@ekleans.com"
                required
              />
            </div>
          </div>

          <button type="submit" class="btn-primary">Send Reset Link</button>

          <div style="text-align: center; margin-top: 1.5rem">
            <a href="admin-login.html" class="forgot-link">← Back to Login</a>
          </div>
        </form>
      </div>

      <div class="auth-footer">Ekleans Industrial © 2026 — Admin Portal</div>
    </div>
  </body>
</html>
