<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | Ekleans</title>
    <link rel="stylesheet" href="css/admin-auth.css" />
  </head>
  <body class="admin-auth-page">
    <div class="auth-wrapper">
      <div class="auth-header">
        <div class="auth-icon">🔒</div>
        <h2>Admin Login</h2>
        <p>Sign in to access your management dashboard</p>
      </div>

      <div class="auth-card">
        <form id="adminLoginForm">
          <div class="form-group">
            <div class="form-header">
              <label for="email">Email Address</label>
            </div>
            <div class="input-wrapper">
              <span class="input-icon">✉️</span>
              <input
                type="email"
                id="email"
                class="form-control"
                placeholder="admin@ekleans.com"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <div class="form-header">
              <label for="password">Password</label>
              <!-- ADDED: Forgot Password Link -->
              <a href="forgot-password.html" class="forgot-link"
                >Forgot Password?</a
              >
            </div>
            <div class="input-wrapper">
              <span class="input-icon">🔑</span>
              <input
                type="password"
                id="password"
                class="form-control"
                placeholder="Your admin password"
                required
              />
              <button type="button" class="toggle-password">👁️</button>
            </div>
          </div>

          <button type="submit" class="btn-primary">
            Sign In to Dashboard
          </button>
        </form>
      </div>

      <div class="auth-footer">Ekleans Industrial © 2026 — Admin Portal</div>
    </div>
  </body>
</html>
